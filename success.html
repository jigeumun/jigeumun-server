<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>결제 완료</title>
</head>
<body>

<h2>결제 확인 중입니다...</h2>
<div id="result">잠시만 기다려주세요.</div>

<script>

async function start(){

const urlParams=new URLSearchParams(window.location.search);

const paymentKey=urlParams.get("paymentKey");
const orderId=urlParams.get("orderId");
const amount=urlParams.get("amount");

const birth=localStorage.getItem("birth");
const time=localStorage.getItem("time");
const gender=localStorage.getItem("gender");

if(!paymentKey||!orderId||!amount){
document.getElementById("result").innerText="잘못된 접근입니다.";
return;
}

try{

const verify=await fetch("/verify-payment",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({paymentKey,orderId,amount})
});

const verifyData=await verify.json();

if(!verifyData.success){
throw new Error("결제 검증 실패");
}

document.getElementById("result").innerHTML=
"<h3>결제가 완료되었습니다 ✅</h3><p>AI가 사주를 분석하고 있습니다...</p>";

const saju=await fetch("/api/saju",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({birth,time,gender})
});

const sajuData=await saju.json();

document.getElementById("result").innerHTML=
"<h3>🔮 사주 분석 결과</h3><pre style='white-space:pre-wrap;'>"+
sajuData.result+
"</pre>";

}catch(err){

document.getElementById("result").innerText=
"현재 분석 요청이 많습니다. 잠시 후 다시 시도해주세요.";

console.error(err);

}

}

start();

</script>

</body>
</html>
